appId: com.dropscrypt.app
productName: DropSCrypt
directories:
  output: dist
files:
  - main/**
  - preload/**
  - renderer/**
  - package.json
win:
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
linux:
  target:
    - target: AppImage
      arch: x64
  artifactName: ${productName}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}_Setup.${ext}
portable:
  artifactName: ${productName}.${ext}
