appId: com.dropscrypt.app
productName: DropSCrypt
directories:
  output: dist
files:
  - main/**
  - preload/**
  - renderer/**
  - package.json
win:
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
