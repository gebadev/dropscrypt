<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropSCrypt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <h1>DropSCrypt</h1>
    <button id="btn-settings" class="btn-header-settings" type="button" title="設定">⚙</button>
  </header>

  <!-- gpg 警告バナー（非表示がデフォルト） -->
  <div id="gpg-warning" class="warning-banner hidden">
    ⚠️ <span id="gpg-warning-text"></span>
  </div>

  <!-- 操作エリア -->
  <section class="operation-area">
    <div id="drop-zone" class="drop-zone">
      <p>ファイルまたはフォルダをここにドロップ</p>
    </div>

    <div class="passphrase-row">
      <label for="passphrase">パスフレーズ:</label>
      <input type="password" id="passphrase" placeholder="パスフレーズを入力" autocomplete="off" />
      <button id="toggle-passphrase" type="button">表示</button>
    </div>
    <div id="passphrase-error" class="field-error hidden">パスフレーズを入力してください</div>

    <div class="button-row">
      <button id="btn-encrypt" class="btn-primary" disabled>暗号化</button>
      <button id="btn-decrypt" class="btn-primary" disabled>復号</button>
    </div>
  </section>

  <!-- ファイル一覧 -->
  <section class="file-list-area">
    <div class="file-list-header">
      <button id="btn-clear-all" class="btn-clear-all" type="button" disabled>全件クリア</button>
    </div>
    <table id="file-table">
      <thead>
        <tr>
          <th class="col-name">ファイル名</th>
          <th class="col-size">サイズ</th>
          <th class="col-status">状態</th>
          <th class="col-remove"></th>
        </tr>
      </thead>
      <tbody id="file-tbody"></tbody>
    </table>
  </section>

  <!-- ステータスバー -->
  <footer class="status-bar">
    <div class="progress-bar-wrap">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="status-text" class="status-text">ファイルをドロップしてください</div>
  </footer>

  <!-- 設定モーダル -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-title">設定</h2>

      <div class="settings-row">
        <label class="settings-label" for="settings-gpg-path" id="label-gpg-path">gpg パス</label>
        <div class="settings-input-group">
          <input type="text" id="settings-gpg-path" class="settings-input" placeholder="空欄 = 自動検出" />
          <button id="settings-browse" type="button" class="btn-browse">参照...</button>
        </div>
        <div class="settings-hint" id="hint-gpg-path"></div>
      </div>

      <div class="settings-row">
        <label class="settings-label" for="settings-encrypt-args">暗号化 追加引数</label>
        <input type="text" id="settings-encrypt-args" class="settings-input" placeholder="例: --compress-level 0" />
        <div class="settings-hint">スペース区切りで gpg の引数を追加できます</div>
      </div>

      <div class="settings-row">
        <label class="settings-label" for="settings-decrypt-args">復号 追加引数</label>
        <input type="text" id="settings-decrypt-args" class="settings-input" placeholder="" />
        <div class="settings-hint">スペース区切りで gpg の引数を追加できます</div>
      </div>

      <div class="modal-buttons">
        <button id="settings-cancel" type="button" class="btn-secondary">キャンセル</button>
        <button id="settings-save" type="button" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
