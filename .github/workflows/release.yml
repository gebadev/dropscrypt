name: Release Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# このワークフローに必要な最小権限のみ付与
permissions:
  contents: write  # GitHub Release の作成・アセット添付に必要

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # タグを起点にチェックアウト（デフォルトブランチの最新ではなくタグ時点のコードを使用）
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts: postinstall 等の任意スクリプト実行を抑止しサプライチェーン攻撃リスクを低減

      - name: Build
        run: npm run dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DropSCrypt_Setup.exe
            dist/DropSCrypt.exe
          generate_release_notes: true
          draft: false
          prerelease: false
